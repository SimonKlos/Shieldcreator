    function useCounter(target, duration = 1500, active = true) {
      const [value, setValue] = useState(0);
      useEffect(() => {
        if (!active) return;
        let start = 0;
        const step = target / (duration / 16);
        const timer = setInterval(() => {
          start += step;
          if (start >= target) { setValue(target); clearInterval(timer); }
          else { setValue(Math.round(start)); }
        }, 16);
        return () => clearInterval(timer);
      }, [target, active, duration]);
      return value;
    }

    function useInView(threshold = 0.15) {
      const ref = useRef(null);
      const [inView, setInView] = useState(false);
      useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) setInView(true); },
          { threshold }
        );
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);
      return [ref, inView];
    }

                  onFocus={e => e.target.style.borderColor = C.forest} onBlur={e => e.target.style.borderColor = C.rule} />
              </div>
            </div>
            {/* Campaign section */}
            <div style={{ background: C.mintBg, border: `1px solid rgba(0,200,117,0.25)`, borderRadius: 12, padding: "1rem 1.25rem" }}>
              <div style={{ fontSize: "0.68rem", fontWeight: 700, color: C.forest, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "0.85rem" }}>
                🛡️ GEPLANTE KAMPAGNE (OPTIONAL)
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
                <div>
                  <label style={labelStyle}>Kampagnenname</label>
                  <input style={inputStyle} placeholder="z.B. H&M Winterkollektion" value={campaignName} onChange={e => setCampaignName(e.target.value)}
                    onFocus={e => e.target.style.borderColor = C.forest} onBlur={e => e.target.style.borderColor = C.rule} />
                </div>
                <div>
                  <label style={labelStyle}>Kampagnenwert (CHF)</label>
                  <input style={inputStyle} type="number" placeholder="z.B. 8500" value={campaignValue} onChange={e => setCampaignValue(e.target.value)}
                    onFocus={e => e.target.style.borderColor = C.forest} onBlur={e => e.target.style.borderColor = C.rule} />
                </div>
              </div>
            </div>
            <button onClick={handleSubmit} disabled={!canSubmit} style={{
              background: canSubmit ? C.forest : C.rule,
              color: canSubmit ? C.white : C.ink4,
              border: "none", padding: "1rem", borderRadius: 12,
              fontSize: "1rem", fontWeight: 600, cursor: canSubmit ? "pointer" : "not-allowed",
              marginTop: "0.5rem",
              boxShadow: canSubmit ? "0 4px 20px rgba(20,56,46,0.25)" : "none",
              transition: "transform 0.2s cubic-bezier(0.22,1,0.36,1), box-shadow 0.2s, background 0.3s",
            }}
            onMouseEnter={e => { if (canSubmit) { e.currentTarget.style.transform = "translateY(-1px)"; e.currentTarget.style.boxShadow = "0 6px 24px rgba(20,56,46,0.35)"; }}}
            onMouseLeave={e => { e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = canSubmit ? "0 4px 20px rgba(20,56,46,0.25)" : "none"; }}>
              KI-Analyse starten →
            </button>
            <div style={{ fontSize: "0.65rem", color: C.ink4, textAlign: "center" }}>
              * Pflichtfelder · Daten werden verschlüsselt übertragen
            </div>
          </div>
        </div>
      );
    }

    // ─── ANALYSIS STEP ────────────────────────────────────────
    function AnalysisStep({ profileData, onNext, onResult }) {
      const [phase, setPhase]       = useState(0);
      const [visible, setVisible]   = useState(false);
      const [apiDone, setApiDone]   = useState(false);
      const [resultData, setResultData] = useState(null);
      useEffect(() => { setTimeout(() => setVisible(true), 100); }, []);
      useEffect(() => {
        const timers = [
          setTimeout(() => setPhase(1), 600),
          setTimeout(() => setPhase(2), 1800),
          setTimeout(() => setPhase(3), 3000),
        ];
        return () => timers.forEach(clearTimeout);
      }, []);
      useEffect(() => {
        async function callN8n() {
          try {
            const response = await fetch(N8N_SCORING_URL, {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify(profileData),
            });
            let data = await response.json();
            if (Array.isArray(data)) data = data[0];
            if (data && data.overall_risk_score !== undefined) { setResultData(data); }
            else { throw new Error("Invalid response"); }
          } catch (err) {
            console.log("n8n not reachable, using fallback:", err.message);
            const fallback = { ...FALLBACK_PROFILES[profileData.platform] || FALLBACK_PROFILES.instagram };
            fallback.handle = profileData.handle;
            fallback.email  = profileData.email;
            setResultData(fallback);
          }
          setApiDone(true);
        }
        callN8n();
      }, []);

      const showButton = phase >= 3 && apiDone;
      useEffect(() => { if (showButton) setPhase(4); }, [showButton]);

      const handleNext = () => { onResult(resultData); onNext(); };

      const steps = [
        { label: "Profildaten verifizieren",          detail: `${(profileData.followers || 0).toLocaleString("de-CH")} Follower auf ${profileData.platform}` },
        { label: "Engagement & Reichweite analysieren", detail: `Ø ${profileData.engagement_rate || 4.0}% Engagement Rate` },
        { label: "KI-Risikobewertung berechnen",      detail: `Nische: ${profileData.niche || "Lifestyle"}` },
        { label: "Versicherungspaket konfigurieren",  detail: resultData ? `Risk Score: ${resultData.overall_risk_score}/100` : "Berechne..." },
      ];

      const platformIcon = profileData.platform === "instagram" ? "📸" : profileData.platform === "youtube" ? "▶️" : "🎵";

      return (
        <div style={{
          minHeight: "100vh", display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center", padding: "5rem 2rem 2rem",
          background: C.cream,
          opacity: visible ? 1 : 0, transition: "opacity 0.5s",
        }}>
          <StepIndicator current={2} />
          <h2 style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: "2rem", fontWeight: 800,
            letterSpacing: "-0.03em", color: C.ink, margin: "2rem 0 0.4rem" }}>KI-Analyse läuft</h2>
          <p style={{ color: C.ink3, fontSize: "0.9rem", marginBottom: "2.5rem" }}>
            Claude AI bewertet dein Risikoprofil in Echtzeit
          </p>

          {/* Profile card */}
          <div style={{
            background: C.white, border: `1px solid ${C.rule}`, borderRadius: 14,
            padding: "1.25rem 1.5rem", marginBottom: "2rem",
            display: "flex", alignItems: "center", gap: "1.25rem", minWidth: 340,
          }}>
            <div style={{ width: 48, height: 48, borderRadius: "50%", background: C.forest,
              display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.3rem", flexShrink: 0 }}>
              {platformIcon}
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 600, color: C.ink, fontSize: "0.95rem" }}>{profileData.handle}</div>
              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: "0.7rem", color: C.ink4 }}>
                {profileData.platform} · {profileData.niche || "Creator"}
              </div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontWeight: 700, color: C.ink, fontFamily: "'DM Mono', monospace", fontSize: "0.95rem" }}>
                {(profileData.followers || 0).toLocaleString("de-CH")}
              </div>
              <div style={{ fontSize: "0.6rem", color: C.ink4 }}>Follower</div>
            </div>
          </div>

          {/* Steps */}
          <div style={{ display: "flex", flexDirection: "column", gap: "0.65rem", width: "100%", maxWidth: 420 }}>
            {steps.map((s, i) => {
              const done = phase > i, active = phase === i;
              return (
                <div key={i} style={{
                  background: done ? `rgba(0,200,117,0.06)` : C.white,
                  border: `1px solid ${done ? "rgba(0,200,117,0.3)" : active ? "rgba(0,200,117,0.5)" : C.rule}`,
                  borderRadius: 12, padding: "0.9rem 1.25rem",
                  display: "flex", alignItems: "center", gap: "1rem",
                  transition: "border-color 0.4s, background 0.4s",
                }}>
                  <div style={{
                    width: 28, height: 28, borderRadius: "50%", flexShrink: 0,
                    background: done ? C.mint : active ? C.forest : C.rule,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: "0.75rem", color: C.white, fontWeight: 700,
                    transition: "background 0.4s",
                    boxShadow: active ? `0 0 14px rgba(20,56,46,0.35)` : "none",
                  }}>
                    {done ? "✓" : active ? <span style={{ animation: "spin 1s linear infinite", display: "inline-block" }}>⟳</span> : i + 1}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: "0.85rem", fontWeight: 600, color: done || active ? C.ink : C.ink4 }}>{s.label}</div>
                    {(done || active) && (
                      <div style={{ fontSize: "0.68rem", color: C.ink3, fontFamily: "'DM Mono', monospace", marginTop: "0.1rem", opacity: done ? 1 : 0.6 }}>
                        {s.detail}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {phase >= 4 && (
            <button onClick={handleNext} style={{
              marginTop: "2rem", background: C.forest, color: C.white, border: "none",
              padding: "0.85rem 2.5rem", borderRadius: 12, fontSize: "0.95rem", fontWeight: 600, cursor: "pointer",
              boxShadow: "0 4px 20px rgba(20,56,46,0.25)", animation: "fadeUp 0.5s both",
              transition: "transform 0.2s cubic-bezier(0.22,1,0.36,1), box-shadow 0.2s",
            }}
            onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 28px rgba(20,56,46,0.4)"; }}
            onMouseLeave={e => { e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "0 4px 20px rgba(20,56,46,0.25)"; }}>
              Ergebnis anzeigen →
            </button>
          )}
          {phase >= 3 && !apiDone && (
            <div style={{ marginTop: "1.5rem", fontSize: "0.72rem", color: C.ink4, animation: "pulse 1.5s infinite",
              fontFamily: "'DM Mono', monospace" }}>
              Claude AI analysiert dein Profil...
            </div>
          )}
        </div>
      );
    }

    // ─── RESULTS STEP ─────────────────────────────────────────
    function ResultsStep({ data, profileData, onContract }) {
      const [visible, setVisible]         = useState(false);
      const [selectedProducts, setSelectedProducts] = useState(["campaign", "reach", "content"]);
      const [tier, setTier]               = useState("pro");
      const [contracting, setContracting] = useState(false);
      useEffect(() => { setTimeout(() => setVisible(true), 100); }, []);

      const riskScore = useCounter(data.overall_risk_score || 42, 1200, visible);
      const tiers  = data.pricing?.tiers || FALLBACK_PROFILES.instagram.pricing.tiers;
      const prices = data.pricing?.individual_products || {};
      const priceMap = {
        campaign: prices.campaign_protection,
        reach:    prices.reach_protection,
        content:  prices.content_liability,
      };
      const tierData = tiers[tier] || tiers.pro;
      const toggleProduct = (id) => setSelectedProducts(prev => prev.includes(id) ? prev.filter(p => p !== id) : [...prev, id]);
      const getRiskColor = (score) => score < 30 ? C.mint : score < 50 ? C.amber : C.red;
      const campaignAddon = data.pricing?.campaign_addon?.current_campaign;
      const localCampaignPremium = (profileData.campaign_value > 0)
        ? Math.max(9.90, Math.min(990, profileData.campaign_value * 0.03 * 1.1))
        : 0;
      const hasCampaign = campaignAddon || (profileData.campaign_value > 0);
      const getRiskLabel = (score) => score < 30 ? "Niedrig" : score < 50 ? "Mittel" : "Hoch";
      const rd = data.risk_details || {};

      const handleContract = async () => {
        setContracting(true);
        const contractData = {
          handle:              data.handle || profileData.handle,
          platform:            data.platform || profileData.platform,
          email:               data.email || profileData.email,
          followers:           data.followers || profileData.followers,
          niche:               profileData.niche,
          overall_risk_score:  data.overall_risk_score,
          risk_category:       data.risk_category,
          risk_details:        data.risk_details,
          selected_tier:       tier,
          selected_tier_label: tierData.label,
          monthly_premium:     tierData.monthly,
          yearly_premium:      tierData.yearly_total || (tierData.monthly * 12 * 0.85),
          yearly_monthly:      tierData.yearly_monthly,
          campaign_price:      prices.campaign_protection?.monthly || 0,
          reach_price:         prices.reach_protection?.monthly || 0,
          content_price:       prices.content_liability?.monthly || 0,
          bundle_discount:     data.pricing?.bundle_discount || "10%",
          recommendation:      data.recommendation,
          campaign_name:       profileData.campaign_name || null,
          campaign_value:      profileData.campaign_value || 0,
          campaign_premium:    campaignAddon?.premium || localCampaignPremium || 0,
        };
        try {
          const response = await fetch(N8N_CONTRACT_URL, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify(contractData),
          });
          let result = await response.json();
          if (Array.isArray(result)) result = result[0];
          onContract({
            ...contractData,
            contract_number: result.contract_number || "SC-" + Date.now(),
            contract_date:   result.contract_date   || new Date().toLocaleDateString("de-CH"),
          });
        } catch (err) {
          console.log("Contract webhook error, using local confirmation:", err.message);
          onContract({
            ...contractData,
            contract_number: "SC-" + Date.now().toString(36).toUpperCase(),
            contract_date:   new Date().toLocaleDateString("de-CH"),
          });
        }
      };

      return (
        <div style={{
          minHeight: "100vh", padding: "5rem 2rem 3rem",
          background: C.cream,
          opacity: visible ? 1 : 0, transform: visible ? "none" : "translateY(20px)",
          transition: "all 0.7s cubic-bezier(0.22,1,0.36,1)",
        }}>
          <div style={{ maxWidth: 900, margin: "0 auto" }}>
            <div style={{ display: "flex", justifyContent: "center", marginBottom: "2.5rem" }}>
              <StepIndicator current={3} />
            </div>
            <h2 style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: "2rem", fontWeight: 800,
              letterSpacing: "-0.03em", color: C.ink, margin: "0 0 0.4rem", textAlign: "center" }}>
              Dein Versicherungs-Profil
            </h2>
            <p style={{ color: C.ink3, fontSize: "0.9rem", marginBottom: "2rem", textAlign: "center" }}>
              Basierend auf der KI-Analyse von <span style={{ color: C.forest, fontWeight: 600 }}>{data.handle || profileData.handle}</span>
            </p>

            {/* Risk scores */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: "1rem", marginBottom: "1.5rem" }}>
              {[
                { label: "Risk Score",    value: `${riskScore}/100`, color: getRiskColor(data.overall_risk_score || 42), sub: getRiskLabel(data.overall_risk_score || 42) },
                { label: "Campaign Risk", value: `${rd.campaign?.score || 35}`,   color: getRiskColor(rd.campaign?.score || 35), sub: rd.campaign?.level || "Mittel" },
                { label: "Reach Risk",    value: `${rd.reach?.score || 40}`,       color: getRiskColor(rd.reach?.score || 40),    sub: rd.reach?.level    || "Mittel" },
                { label: "Content Risk",  value: `${rd.content?.score || 30}`,     color: getRiskColor(rd.content?.score || 30),  sub: rd.content?.level  || "Mittel" },
              ].map((item, i) => (
                <div key={i} style={{
                  background: C.white, border: `1px solid ${C.rule}`, borderRadius: 14, padding: "1.25rem",
                  animation: visible ? `fadeUp 0.5s ${0.15 + i * 0.1}s both` : "none",
                }}>
                  <div style={{ fontSize: "0.65rem", color: C.ink4, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "0.5rem" }}>{item.label}</div>
                  <div style={{ fontSize: "1.6rem", fontWeight: 700, color: item.color, fontFamily: "'DM Mono', monospace" }}>{item.value}</div>
                  <div style={{ fontSize: "0.7rem", color: C.ink3, marginTop: "0.25rem" }}>{item.sub}</div>
                </div>
              ))}
            </div>

            {/* AI Recommendation */}
            {data.recommendation && (
              <div style={{ background: C.mintBg, border: `1px solid rgba(0,200,117,0.3)`, borderRadius: 12,
                padding: "1rem 1.25rem", marginBottom: "1.5rem" }}>
                <div style={{ fontSize: "0.68rem", color: C.forest, fontWeight: 700, marginBottom: "0.35rem", letterSpacing: "0.06em", textTransform: "uppercase" }}>
                  🤖 KI-Empfehlung
                </div>
                <div style={{ fontSize: "0.85rem", color: C.ink3, lineHeight: 1.65 }}>{data.recommendation}</div>
              </div>
            )}

            {/* Product selection */}
            <div style={{ background: C.white, border: `1px solid ${C.rule}`, borderRadius: 16, padding: "1.5rem", marginBottom: "1.5rem" }}>
              <div style={{ fontSize: "0.68rem", fontWeight: 700, color: C.ink4, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "1rem" }}>
                Versicherungsprodukte wählen
              </div>
              <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap" }}>
                {INSURANCE_PRODUCTS.map(p => {
                  const selected = selectedProducts.includes(p.id);
                  const price = priceMap[p.id];
                  return (
                    <div key={p.id} onClick={() => toggleProduct(p.id)} style={{
                      flex: "1 1 auto", minWidth: 190,
                      background: selected ? `${p.color}10` : "transparent",
                      border: `1.5px solid ${selected ? p.color + "88" : C.rule}`,
                      borderRadius: 12, padding: "1rem 1.25rem", cursor: "pointer",
                      transition: "border-color 0.2s, background 0.2s",
                    }}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: "0.65rem" }}>
                          <span style={{ fontSize: "1.25rem" }}>{p.icon}</span>
                          <div>
                            <div style={{ fontSize: "0.85rem", fontWeight: 600, color: C.ink }}>{p.name}</div>
                            <div style={{ fontSize: "0.68rem", color: C.ink4 }}>{p.subtitle}</div>
                          </div>
                        </div>
                        <div style={{
                          width: 20, height: 20, borderRadius: 5,
                          border: `2px solid ${selected ? p.color : C.rule}`,
                          background: selected ? p.color : "transparent",
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontSize: "0.65rem", color: C.white, transition: "all 0.2s",
                        }}>{selected && "✓"}</div>
                      </div>
                      <div style={{ marginTop: "0.5rem", fontSize: "0.72rem", color: C.ink3, fontFamily: "'DM Mono', monospace" }}>
                        CHF {price?.monthly?.toFixed(2) || "—"}/Mt.
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Tier selection */}
            <div style={{ background: C.white, border: `1px solid ${C.rule}`, borderRadius: 16, padding: "1.5rem", marginBottom: "1.5rem" }}>
              <div style={{ fontSize: "0.68rem", fontWeight: 700, color: C.ink4, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "1rem" }}>
                Tarif wählen
              </div>
              <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap" }}>
                {Object.entries(tiers).map(([key, t]) => (
                  <div key={key} onClick={() => setTier(key)} style={{
                    flex: "1 1 auto", minWidth: 155,
                    background: tier === key ? C.mintBg : "transparent",
                    border: `1.5px solid ${tier === key ? C.forest : C.rule}`,
                    borderRadius: 12, padding: "1rem 1.25rem", cursor: "pointer",
                    position: "relative", transition: "border-color 0.2s, background 0.2s",
                  }}>
                    {key === "pro" && (
                      <div style={{ position: "absolute", top: -8, right: 10,
                        background: C.forest, color: C.white,
                        fontSize: "0.5rem", fontWeight: 700, padding: "0.15rem 0.55rem",
                        borderRadius: 100, textTransform: "uppercase", letterSpacing: "0.08em" }}>
                        Empfohlen
                      </div>
                    )}
                    <div style={{ fontSize: "0.95rem", fontWeight: 700, color: tier === key ? C.forest : C.ink, fontFamily: "'Plus Jakarta Sans', sans-serif" }}>{t.label}</div>
                    <div style={{ fontSize: "1.1rem", fontWeight: 700, color: C.ink, fontFamily: "'DM Mono', monospace", marginTop: "0.3rem" }}>
                      CHF {t.monthly?.toFixed(2)}
                    </div>
                    <div style={{ fontSize: "0.62rem", color: C.ink4 }}>pro Monat</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Campaign addon box */}
            {hasCampaign && (
              <div style={{ background: C.white, border: `1px solid ${C.rule}`, borderRadius: 16, padding: "1.5rem", marginBottom: "1.5rem" }}>
                <div style={{ fontSize: "0.68rem", fontWeight: 700, color: C.forest, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "0.85rem" }}>
                  🛡️ KAMPAGNEN-ZUSCHLAG
                </div>
                {profileData.campaign_name && (
                  <div style={{ fontSize: "0.85rem", fontWeight: 600, color: C.ink, marginBottom: "0.5rem" }}>
                    {profileData.campaign_name}
                  </div>
                )}
                <div style={{ fontSize: "0.8rem", color: C.ink3, fontFamily: "'DM Mono', monospace", marginBottom: "0.4rem" }}>
                  {campaignAddon
                    ? `CHF ${profileData.campaign_value?.toLocaleString("de-CH")} × ${campaignAddon.rate_applied} × Risiko = CHF ${campaignAddon.premium?.toFixed(2)} (einmalig)`
                    : `CHF ${(profileData.campaign_value || 0).toLocaleString("de-CH")} × 3% × 1.10 Risiko = CHF ${localCampaignPremium.toFixed(2)} (einmalig)`
                  }
                </div>
                <div style={{ fontSize: "0.72rem", color: C.ink4 }}>
                  {campaignAddon?.coverage_note || "Deckung pro Kampagne gemäss gewähltem Tarif"}
                </div>
              </div>
            )}

            {/* CTA / Summary */}
            <div style={{
              background: `linear-gradient(135deg, rgba(0,200,117,0.06) 0%, ${C.white} 100%)`,
              border: `1.5px solid rgba(0,200,117,0.25)`, borderRadius: 16,
              padding: "2rem", textAlign: "center",
            }}>
              <div style={{ fontSize: "0.68rem", color: C.ink4, textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: "0.5rem" }}>
                Dein monatlicher Beitrag
              </div>
              <div style={{ fontSize: "3rem", fontWeight: 800, fontFamily: "'DM Mono', monospace",
                color: C.forest, letterSpacing: "-0.03em" }}>
                CHF {tierData.monthly?.toFixed(2) || "—"}
              </div>
              <div style={{ fontSize: "0.8rem", color: C.ink3, marginBottom: "0.4rem" }}>
                pro Monat · {tierData.label} · Bundle-Rabatt inklusive
              </div>
              {tierData.yearly_monthly && (
                <div style={{ fontSize: "0.72rem", color: C.ink4, marginBottom: "1.75rem" }}>
                  oder CHF {tierData.yearly_monthly?.toFixed(2)}/Mt. bei Jahreszahlung
                </div>
              )}
              <div style={{ display: "flex", gap: "0.75rem", justifyContent: "center", flexWrap: "wrap" }}>
                <button onClick={handleContract} disabled={contracting} style={{
                  background: contracting ? C.rule : C.forest,
                  color: C.white, border: "none", padding: "0.85rem 2.5rem",
                  borderRadius: 12, fontSize: "0.95rem", fontWeight: 600,
                  cursor: contracting ? "not-allowed" : "pointer",
                  boxShadow: contracting ? "none" : "0 4px 20px rgba(20,56,46,0.25)",
                  display: "flex", alignItems: "center", gap: "0.5rem",
                  transition: "transform 0.2s cubic-bezier(0.22,1,0.36,1), box-shadow 0.2s",
                }}
                onMouseEnter={e => { if (!contracting) { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 28px rgba(20,56,46,0.4)"; }}}
                onMouseLeave={e => { e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = contracting ? "none" : "0 4px 20px rgba(20,56,46,0.25)"; }}>
                  {contracting && <span style={{ animation: "spin 1s linear infinite", display: "inline-block" }}>⟳</span>}
                  {contracting ? "Vertrag wird erstellt..." : "Jetzt abschliessen →"}
                </button>
                <button style={{
                  background: "transparent", color: C.ink3,
                  border: `1px solid ${C.rule}`, padding: "0.85rem 2rem",
                  borderRadius: 12, fontSize: "0.9rem", cursor: "pointer",
                  transition: "border-color 0.2s, color 0.2s",
                }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = C.rule2; e.currentTarget.style.color = C.ink; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = C.rule; e.currentTarget.style.color = C.ink3; }}>
                  PDF Offerte
                </button>
              </div>
              <div style={{ marginTop: "1.5rem", padding: "0.75rem", background: `rgba(0,200,117,0.08)`,
                border: `1px solid rgba(0,200,117,0.25)`, borderRadius: 8 }}>
                <div style={{ fontSize: "0.72rem", color: C.mint }}>
                  ✓ Detailliertes Angebot wurde an <strong>{profileData?.email}</strong> gesendet
                </div>
              </div>
              <div style={{ marginTop: "1rem", display: "flex", gap: "1.5rem", justifyContent: "center", flexWrap: "wrap" }}>
                {["FINMA Sandbox", "256-bit Verschlüsselung", "Sofort kündbar"].map(t => (
                  <div key={t} style={{ fontSize: "0.65rem", color: C.ink4, display: "flex", alignItems: "center", gap: "0.3rem" }}>
                    <span style={{ color: C.mint }}>✓</span> {t}
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── CONFIRMATION STEP ────────────────────────────────────
    function ConfirmationStep({ contractData, profileData }) {
      const [visible, setVisible] = useState(false);
      useEffect(() => { setTimeout(() => setVisible(true), 100); }, []);
      return (
        <div style={{
          minHeight: "100vh", display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center", padding: "5rem 2rem 2rem",
          background: C.cream,
          opacity: visible ? 1 : 0, transform: visible ? "none" : "translateY(20px)",
          transition: "all 0.7s cubic-bezier(0.22,1,0.36,1)",
        }}>
          <StepIndicator current={4} />
          <div style={{ maxWidth: 600, width: "100%", textAlign: "center", marginTop: "2.5rem" }}>
            {/* Success icon */}
            <div style={{
              width: 80, height: 80, borderRadius: "50%", background: C.mint,
              display: "flex", alignItems: "center", justifyContent: "center",
              margin: "0 auto 1.5rem", fontSize: "2.25rem",
              animation: "checkmark 0.6s cubic-bezier(0.22,1,0.36,1)",
              boxShadow: "0 0 40px rgba(0,200,117,0.25)",
            }}>✓</div>

            <h2 style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: "2rem", fontWeight: 800,
              letterSpacing: "-0.03em", color: C.ink, margin: "0 0 0.5rem" }}>
              Versicherung abgeschlossen!
            </h2>
            <p style={{ color: C.ink3, fontSize: "0.9rem", marginBottom: "2rem" }}>
              Dein Schutz ist ab sofort aktiv
            </p>

            {/* Contract details */}
            <div style={{ background: C.white, border: `1px solid ${C.rule}`, borderRadius: 16, padding: "1.75rem", textAlign: "left", marginBottom: "1.25rem" }}>
              <div style={{ fontSize: "0.65rem", color: C.ink4, textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: "1rem" }}>Vertragsdetails</div>
              {[
                ["Vertragsnummer", contractData.contract_number, C.forest],
                ["Vertragsbeginn", contractData.contract_date,   C.ink],
                ["Tarif",          contractData.selected_tier_label, C.forest],
                ["Handle",         contractData.handle,          C.ink],
                ["Plattform",      contractData.platform,        C.ink],
                ...(contractData.campaign_name ? [["Kampagne", contractData.campaign_name, C.ink]] : []),
                ...(contractData.campaign_premium > 0 ? [["Kampagnen-Zuschlag", `CHF ${contractData.campaign_premium.toFixed(2)}`, C.mint]] : []),
              ].map(([label, value, color]) => (
                <div key={label} style={{ display: "flex", justifyContent: "space-between", padding: "0.6rem 0", borderBottom: `1px solid ${C.rule}` }}>
                  <span style={{ color: C.ink3, fontSize: "0.85rem" }}>{label}</span>
                  <span style={{ color, fontWeight: 600, fontSize: "0.85rem", fontFamily: label === "Vertragsnummer" ? "'DM Mono', monospace" : "inherit" }}>
                    {value}
                  </span>
                </div>
              ))}
              <div style={{ display: "flex", justifyContent: "space-between", padding: "0.85rem 0", marginTop: "0.25rem" }}>
                <span style={{ color: C.ink3, fontSize: "0.85rem" }}>Monatsprämie</span>
                <span style={{ color: C.mint, fontWeight: 700, fontSize: "1.2rem", fontFamily: "'DM Mono', monospace" }}>
                  CHF {contractData.monthly_premium?.toFixed(2)}
                </span>
              </div>
            </div>

            {/* Coverage */}
            <div style={{ background: C.white, border: `1px solid ${C.rule}`, borderRadius: 16, padding: "1.5rem", textAlign: "left", marginBottom: "1.25rem" }}>
              <div style={{ fontSize: "0.65rem", color: C.ink4, textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: "0.75rem" }}>
                Dein Schutz umfasst
              </div>
              {INSURANCE_PRODUCTS.map(p => (
                <div key={p.id} style={{ display: "flex", alignItems: "center", gap: "0.65rem", padding: "0.5rem 0" }}>
                  <span style={{ fontSize: "1.1rem" }}>{p.icon}</span>
                  <span style={{ fontSize: "0.85rem", color: C.ink, flex: 1 }}>{p.name}</span>
                  <span style={{ fontSize: "0.7rem", color: C.mint, fontWeight: 600 }}>✓ Aktiv</span>
                </div>
              ))}
            </div>

            {/* Email confirmation */}
            <div style={{ background: `rgba(0,200,117,0.08)`, border: `1px solid rgba(0,200,117,0.25)`, borderRadius: 12, padding: "1rem", marginBottom: "1.25rem" }}>
              <div style={{ fontSize: "0.8rem", color: C.mint }}>
                ✓ Vertragsbestätigung an <strong>{contractData.email || profileData?.email}</strong> gesendet
              </div>
              <div style={{ fontSize: "0.7rem", color: C.ink4, marginTop: "0.3rem" }}>
                Kundendaten im CRM gespeichert · Risikoportfolio aktualisiert · Umsatz erfasst
              </div>
            </div>

            {/* Next steps */}
            <div style={{ background: C.mintBg, border: `1px solid rgba(0,200,117,0.3)`, borderRadius: 12, padding: "1rem", marginBottom: "1.75rem", textAlign: "left" }}>
              <div style={{ fontSize: "0.68rem", color: C.forest, fontWeight: 700, marginBottom: "0.5rem", textTransform: "uppercase", letterSpacing: "0.06em" }}>
                Nächste Schritte
              </div>
              {["Verbinde deinen Account im Dashboard", "Aktiviere den Content-Scanner", "Registriere deine erste Kampagne"].map((step, i) => (
                <div key={i} style={{ fontSize: "0.82rem", color: C.ink3, padding: "0.2rem 0", display: "flex", gap: "0.5rem" }}>
                  <span style={{ color: C.ink4, fontFamily: "'DM Mono', monospace", fontSize: "0.7rem" }}>0{i + 1}.</span>
                  {step}
                </div>
              ))}
            </div>

            <button style={{
              background: C.forest, color: C.white, border: "none",
              padding: "0.9rem 2.5rem", borderRadius: 12, fontSize: "0.95rem", fontWeight: 600, cursor: "pointer",
              boxShadow: "0 4px 20px rgba(20,56,46,0.25)",
              transition: "transform 0.2s cubic-bezier(0.22,1,0.36,1), box-shadow 0.2s",
            }}
            onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 28px rgba(20,56,46,0.4)"; }}
            onMouseLeave={e => { e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "0 4px 20px rgba(20,56,46,0.25)"; }}>
              Zum Dashboard →
            </button>
            <div style={{ marginTop: "1.25rem", display: "flex", gap: "1.5rem", justifyContent: "center", flexWrap: "wrap" }}>
              {["FINMA Sandbox", "256-bit Verschlüsselung", "Sofort kündbar"].map(t => (
                <div key={t} style={{ fontSize: "0.65rem", color: C.ink4, display: "flex", alignItems: "center", gap: "0.3rem" }}>
                  <span style={{ color: C.mint }}>✓</span> {t}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── APP ──────────────────────────────────────────────────
    // ─────────────────────────────────────────────────────────
    // CHATBOT KOMPONENTE
    // ─────────────────────────────────────────────────────────
    function ChatBot() {
      const [isOpen, setIsOpen]       = React.useState(false);
      const [messages, setMessages]   = React.useState([
        { role: "assistant", content: "Hi! Ich bin dein ShieldCreator Assistent 🛡️ Wie kann ich dir helfen?" }
      ]);
      const [input, setInput]         = React.useState("");
      const [isLoading, setIsLoading] = React.useState(false);
      const [hasError, setHasError]   = React.useState(false);
      const messagesEndRef = React.useRef(null);
      const inputRef       = React.useRef(null);

      // Auto-scroll
      React.useEffect(() => {
        if (messagesEndRef.current) {
          messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
        }
      }, [messages]);

      // Focus input when opened
      React.useEffect(() => {
        if (isOpen && inputRef.current) inputRef.current.focus();
      }, [isOpen]);

      const sendMessage = async (overrideText) => {
        const trimmed = (overrideText !== undefined ? overrideText : input).trim();
        if (!trimmed || isLoading) return;

        const userMessage = { role: "user", content: trimmed };
        const newMessages = [...messages, userMessage];
        setMessages(newMessages);
        setInput("");
        setIsLoading(true);
        setHasError(false);

        try {
          const history = newMessages
            .slice(1)   // Skip initial assistant greeting
            .slice(-10); // Last 10 messages for context window

          const res = await fetch(N8N_CHAT_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: trimmed, history }),
          });

          if (!res.ok) throw new Error("Network response was not ok");
          const data = await res.json();

          setMessages(prev => [...prev, {
            role: "assistant",
            content: data.reply || "Entschuldigung, ich konnte keine Antwort generieren. Bitte kontaktiere support@shieldcreator.com"
          }]);
        } catch (err) {
          setHasError(true);
          setMessages(prev => [...prev, {
            role: "assistant",
            content: "Es tut mir leid, ich bin gerade nicht erreichbar. Bitte schreibe uns direkt an support@shieldcreator.com 📧"
          }]);
        } finally {
          setIsLoading(false);
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      // ── STYLES ────────────────────────────────────────────────────
      const bubbleStyle = (role) => ({
        maxWidth: "82%",
        alignSelf: role === "user" ? "flex-end" : "flex-start",
        background: role === "user"
          ? "#14382E"
          : "#FAFAF7",
        color: role === "user" ? "#FFFFFF" : "#1A1A1A",
        padding: "0.65rem 0.95rem",
        borderRadius: role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
        fontSize: "0.82rem",
        lineHeight: 1.5,
        border: role === "user" ? "none" : "1px solid #E5E5E0",
        wordBreak: "break-word",
      });

      return (
        React.createElement(React.Fragment, null,
          /* Floating Button */
          React.createElement("button", {
            onClick: () => setIsOpen(o => !o),
            style: {
              position: "fixed", bottom: 28, right: 28, zIndex: 9999,
              width: 56, height: 56, borderRadius: "50%", border: "none",
              background: "#14382E",
              boxShadow: "0 4px 24px rgba(20,56,46,0.35)",
              cursor: "pointer", fontSize: "1.4rem",
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "transform 0.25s cubic-bezier(0.22,1,0.36,1), box-shadow 0.25s",
              transform: isOpen ? "scale(0.92)" : "scale(1)",
            },
            title: "ShieldCreator Assistent",
          }, isOpen ? "✕" : "🛡️"),

          /* Chat Window */
          isOpen && React.createElement("div", {
            style: {
              position: "fixed", bottom: 96, right: 28, zIndex: 9998,
              width: 360, maxWidth: "calc(100vw - 56px)",
              height: 520, maxHeight: "calc(100vh - 120px)",
              background: "#FFFFFF",
              border: "1px solid #E5E5E0",
              borderRadius: 20,
              boxShadow: "0 24px 64px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,200,117,0.08)",
              display: "flex", flexDirection: "column",
              animation: "fadeUp 0.3s cubic-bezier(0.22,1,0.36,1) both",
              overflow: "hidden",
            }
          },
            /* Header */
            React.createElement("div", {
              style: {
                padding: "1rem 1.2rem", background: "#FFFFFF",
                borderBottom: "1px solid #E5E5E0",
                display: "flex", alignItems: "center", gap: "0.75rem",
                flexShrink: 0,
              }
            },
              React.createElement("div", {
                style: {
                  width: 36, height: 36, borderRadius: "50%",
                  background: "#14382E",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: "1rem", flexShrink: 0,
                }
              }, "🛡️"),
              React.createElement("div", null,
                React.createElement("div", {
                  style: { fontFamily: "'Plus Jakarta Sans', sans-serif", fontWeight: 800, fontSize: "0.9rem", letterSpacing: "-0.01em" }
                },
                  React.createElement("span", { style: { color: "#1A1A1A" } }, "shield"),
                  React.createElement("span", { style: { color: "#00C875" } }, "creator"),
                  React.createElement("span", { style: { color: "#6B6B6B", fontWeight: 400, fontSize: "0.7rem", marginLeft: 6 } }, "Assistent")
                ),
                React.createElement("div", {
                  style: { fontSize: "0.65rem", color: "#00C875", display: "flex", alignItems: "center", gap: 4 }
                },
                  React.createElement("span", { style: { width: 6, height: 6, borderRadius: "50%", background: "#00C875", display: "inline-block" } }),
                  "Online"
                )
              )
            ),

            /* Messages */
            React.createElement("div", {
              style: {
                flex: 1, overflowY: "auto", padding: "1rem",
                display: "flex", flexDirection: "column", gap: "0.65rem",
                scrollbarWidth: "thin", scrollbarColor: "#E5E5E0 #FFFFFF",
              }
            },
              messages.map((m, i) =>
                React.createElement("div", { key: i, style: { display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" } },
                  React.createElement("div", { style: bubbleStyle(m.role) },
                    m.role === "user" ? m.content : React.createElement("span", { dangerouslySetInnerHTML: { __html: parseMarkdown(m.content) } }),
                    m.content.includes("support@shieldcreator.com") &&
                      React.createElement("div", { style: { marginTop: "0.4rem" } },
                        React.createElement("a", {
                          href: "mailto:support@shieldcreator.com",
                          style: { color: "#00C875", fontSize: "0.75rem", textDecoration: "none", display: "inline-flex", alignItems: "center", gap: 4 }
                        }, "📧 support@shieldcreator.com")
                      )
                  )
                )
              ),
              isLoading && React.createElement("div", { style: { display: "flex", justifyContent: "flex-start" } },
                React.createElement("div", { style: { ...bubbleStyle("assistant"), display: "flex", gap: 4, alignItems: "center", padding: "0.75rem 1rem" } },
                  [0,1,2].map(i =>
                    React.createElement("span", {
                      key: i,
                      style: {
                        width: 6, height: 6, borderRadius: "50%", background: "#14382E",
                        animation: "pulse 1.2s ease-in-out infinite",
                        animationDelay: `${i * 0.2}s`,
                      }
                    })
                  )
                )
              ),
              React.createElement("div", { ref: messagesEndRef })
            ),

            /* Quick Suggestions (only at start) */
            messages.length === 1 && React.createElement("div", {
              style: { padding: "0 1rem 0.75rem", display: "flex", flexWrap: "wrap", gap: "0.4rem", flexShrink: 0 }
            },
              ["Was kostet Campaign Protection?", "Welche Produkte gibt es?", "Wie funktioniert der Schadensfall?"].map(q =>
                React.createElement("button", {
                  key: q,
                  onClick: () => sendMessage(q),
                  style: {
                    background: "#E8FAF0", border: "1px solid rgba(0,200,117,0.3)",
                    color: "#14382E", borderRadius: 20, padding: "0.3rem 0.75rem",
                    fontSize: "0.7rem", cursor: "pointer", fontFamily: "'Plus Jakarta Sans', sans-serif",
                    transition: "background 0.2s",
                  },
                  onMouseEnter: e => e.currentTarget.style.background = "rgba(0,200,117,0.2)",
                  onMouseLeave: e => e.currentTarget.style.background = "#E8FAF0",
                }, q)
              )
            ),

            /* Input */
            React.createElement("div", {
              style: {
                padding: "0.75rem 1rem", borderTop: "1px solid #E5E5E0",
                display: "flex", gap: "0.5rem", alignItems: "flex-end",
                background: "#FFFFFF", flexShrink: 0,
              }
            },
              React.createElement("textarea", {
                ref: inputRef,
                value: input,
                onChange: e => setInput(e.target.value),
                onKeyDown: handleKeyDown,
                placeholder: "Frage stellen...",
                rows: 1,
                style: {
                  flex: 1, background: "#FFFFFF", border: "1px solid #E5E5E0",
                  borderRadius: 12, padding: "0.6rem 0.85rem", color: "#1A1A1A",
                  fontSize: "0.82rem", resize: "none", lineHeight: 1.4,
                  maxHeight: 100, overflowY: "auto",
                  fontFamily: "'Plus Jakarta Sans', sans-serif",
                  scrollbarWidth: "thin",
                  "::placeholder": { color: "#A0A0A0" },
                }
              }),
              React.createElement("button", {
                onClick: () => sendMessage(),
                disabled: !input.trim() || isLoading,
                style: {
                  width: 38, height: 38, borderRadius: "50%", border: "none",
                  background: input.trim() && !isLoading
                    ? "#14382E"
                    : "#E5E5E0",
                  color: input.trim() && !isLoading ? "#FFFFFF" : "#6B6B6B",
                  cursor: input.trim() && !isLoading ? "pointer" : "not-allowed",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: "0.9rem", transition: "background 0.2s", flexShrink: 0,
                }
              }, "↑")
            )
          )
        )
      );
    }

    function App() {
      const [step, setStep]               = useState(0);
      const [profileData, setProfileData] = useState(null);
      const [resultData, setResultData]   = useState(null);
      const [contractData, setContractData] = useState(null);

      // Scroll to top on step change
      useEffect(() => { window.scrollTo({ top: 0, behavior: "smooth" }); }, [step]);

      return (
        <div style={{ background: C.cream, minHeight: "100vh", fontFamily: "'Plus Jakarta Sans', sans-serif", color: C.ink, position: "relative" }}>
          <BgDecor />

          {/* Sticky header for steps 1–4 */}
          {step > 0 && (
            <div style={{
              position: "fixed", top: 0, left: 0, right: 0,
              background: `rgba(255,255,255,0.95)`, backdropFilter: "blur(16px)",
              borderBottom: `1px solid ${C.rule}`, padding: "0 2rem", height: 60,
              display: "flex", alignItems: "center", justifyContent: "space-between",
              zIndex: 200, animation: "fadeIn 0.4s both",
            }}>
              <div onClick={() => { setStep(0); setProfileData(null); setResultData(null); setContractData(null); }}
                style={{ display: "flex", alignItems: "center", gap: "0.5rem", cursor: "pointer" }}>
                <svg width={28} height={28} viewBox="0 0 52 52" fill="none">
                  <circle cx={26} cy={26} r={24} stroke="#14382E" strokeWidth={2.5} />
                  <circle cx={26} cy={26} r={24} stroke="#00C875" strokeWidth={2.5} strokeDasharray="45 107" strokeDashoffset={-14} />
                  <path d="M26 14 L18 18 L18 28 C18 33 22 37 26 38 C30 37 34 33 34 28 L34 18 Z" fill="none" stroke="#00C875" strokeWidth={2} strokeLinejoin="round" />
                  <polyline points="21,26 24,29 31,22" stroke="#00C875" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" fill="none" />
                </svg>
                <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: "1.1rem", fontWeight: 800, letterSpacing: "-0.02em" }}>
                  <span style={{ color: C.ink }}>shield</span>
                  <span style={{ color: C.mint }}>creator</span>
                </span>
              </div>
              <div style={{ fontSize: "0.65rem", color: C.ink4, fontFamily: "'DM Mono', monospace" }}>
                DEMO · v0.7 · HSG 2026
              </div>
            </div>
          )}

          <div style={{ position: "relative", zIndex: 1 }}>
            {step === 0 && <LandingStep onNext={() => setStep(1)} />}
            {step === 1 && <ProfileStep onNext={(data) => { setProfileData(data); setStep(2); }} />}
            {step === 2 && profileData && (
              <AnalysisStep profileData={profileData} onNext={() => setStep(3)} onResult={setResultData} />
            )}
            {step === 3 && resultData && (
              <ResultsStep data={resultData} profileData={profileData} onContract={(cd) => { setContractData(cd); setStep(4); }} />
            )}
            {step === 4 && contractData && (
              <ConfirmationStep contractData={contractData} profileData={profileData} />
            )}
          </div>
          <ChatBot />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
